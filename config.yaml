# llm_path: /path/to/Qwen3-8B/

# llm_name: Qwen2.5-1.5B
# llm_path: /path/to/Qwen2.5-1.5B/

llm_name: DeepSeek-R1-Distill-Llama-8B
llm_path: /path/to/DeepSeek-R1-Distill-Llama-8B/